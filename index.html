<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>5 Ночей с Бабками</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Russo+One&family=Share+Tech+Mono&display=swap');

  :root {
    --red: #c0392b;
    --green-cam: #00ff41;
    --amber: #ffb000;
    --water-color: #3498db;
    --hud-h: 115px;
    --top-h: 50px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    background: #000;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    width: 100%;
    height: 100%;
    height: 100dvh;
  }

  /* =========================================================
     MENU
  ========================================================= */
  #menu {
    position: fixed; inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }

  #menu h1 {
    font-family: 'Creepster', cursive;
    font-size: clamp(2.4rem, 11vw, 5rem);
    color: var(--red);
    text-shadow: 0 0 40px rgba(192,57,43,0.8), 0 0 80px rgba(192,57,43,0.4);
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.1;
    animation: flicker 4s infinite;
  }

  #menu .subtitle {
    font-family: 'Russo One', sans-serif;
    color: #555;
    margin-top: 8px;
    font-size: clamp(0.55rem, 3vw, 0.85rem);
    letter-spacing: 5px;
    text-transform: uppercase;
  }

  #menu .night-info {
    margin-top: 28px;
    font-size: clamp(1rem, 4vw, 1.4rem);
    color: var(--amber);
    font-family: 'Russo One', sans-serif;
  }

  #menu .start-btn {
    margin-top: 24px;
    padding: 16px 44px;
    background: transparent;
    border: 2px solid var(--red);
    color: var(--red);
    font-family: 'Russo One', sans-serif;
    font-size: clamp(1rem, 4vw, 1.3rem);
    letter-spacing: 4px;
    cursor: pointer;
    text-transform: uppercase;
    border-radius: 2px;
    position: relative;
    z-index: 10;
    touch-action: manipulation;
    -webkit-tap-highlight-color: rgba(192,57,43,0.3);
  }
  #menu .start-btn:active { background: var(--red); color: #fff; }

  .difficulty-wrap {
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    position: relative;
    z-index: 10;
  }
  .diff-label {
    font-size: 0.6rem;
    color: #555;
    letter-spacing: 4px;
  }
  .diff-btns {
    display: flex;
    gap: 8px;
  }
  .diff-btn {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid #333;
    color: #555;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 2px;
    touch-action: manipulation;
    transition: all 0.15s;
  }
  .diff-btn.active        { border-color: var(--amber); color: var(--amber); }
  .diff-btn:hover         { border-color: #666; color: #888; }
  .diff-btn.active:hover  { border-color: var(--amber); color: var(--amber); }

  .menu-babs {
    position: absolute;
    bottom: 0;
    display: flex;
    justify-content: center;
    width: 100%;
    gap: 20px;
    pointer-events: none;
  }
  .menu-babs img {
    height: clamp(150px, 38vh, 270px);
    object-fit: contain;
    mix-blend-mode: lighten;
    opacity: 0.65;
    filter: drop-shadow(0 0 16px rgba(255,0,0,0.3));
    pointer-events: none;
  }

  /* =========================================================
     GAME WRAPPER
  ========================================================= */
  #game {
    display: none;
    width: 100%;
    height: 100%;
    height: 100dvh;
    position: relative;
    overflow: hidden;
  }

  /* =========================================================
     TOP BAR
  ========================================================= */
  #topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: var(--top-h);
    padding: 0 12px;
    background: rgba(0,0,0,0.95);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 20;
    border-bottom: 1px solid #1a1a1a;
  }

  .granny-status {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
  }

  .granny-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
  }
  .granny-dot.blue { background: #3498db; color: #3498db; }
  .granny-dot.red  { background: var(--red); color: var(--red); }

  .granny-info { line-height: 1.25; }
  .granny-name { font-size: 0.58rem; letter-spacing: 1px; }
  .granny-name.blue { color: #3498db; }
  .granny-name.red  { color: var(--red); }
  .granny-loc  { font-size: 0.52rem; color: #555; }

  .topbar-time {
    font-family: 'Russo One', sans-serif;
    font-size: 1rem;
    color: var(--amber);
    text-shadow: 0 0 8px rgba(255,176,0,0.5);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  /* =========================================================
     MAIN SCENE
  ========================================================= */
  #apartment-view {
    position: absolute;
    top: var(--top-h);
    left: 0; right: 0;
    bottom: var(--hud-h);
    background: #000;
    overflow: hidden;
  }

  #apartment-view img.scene-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  #apartment-view::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 5;
  }

  /* =========================================================
     CAMERA PANEL
  ========================================================= */
  #camera-panel {
    display: none;
    position: absolute;
    top: var(--top-h);
    left: 0; right: 0;
    bottom: var(--hud-h);
    background: #000;
    flex-direction: column;
    z-index: 10;
  }
  #camera-panel.active { display: flex; }

  .cam-header {
    padding: 5px 10px;
    background: #050505;
    border-bottom: 1px solid #111;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.58rem;
    color: var(--green-cam);
    flex-shrink: 0;
  }
  .cam-header .blink { animation: blink 1s infinite; }

  .cam-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 2px;
    padding: 2px;
    background: #050505;
    overflow: hidden;
    min-height: 0;
  }

  /* 5th cam full width */
  .cam-cell:nth-child(5) { grid-column: 1 / -1; }

  .cam-cell {
    position: relative;
    background: #000;
    overflow: hidden;
    border: 1px solid #111;
    cursor: pointer;
    transition: box-shadow 0.15s;
  }
  .cam-cell:active { opacity: 0.85; }

  /* Полноэкранная камера */
  #cam-fullscreen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #000;
    flex-direction: column;
  }
  #cam-fullscreen.active { display: flex; }

  #cam-fullscreen .fs-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: #050505;
    border-bottom: 1px solid #111;
    flex-shrink: 0;
  }
  #cam-fullscreen .fs-label {
    font-size: 0.7rem;
    color: var(--green-cam);
    letter-spacing: 2px;
  }
  #cam-fullscreen .fs-close {
    padding: 8px 18px;
    background: transparent;
    border: 1px solid #333;
    color: #666;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 2px;
    touch-action: manipulation;
  }
  #cam-fullscreen .fs-close:active { background: #1a1a1a; }

  #cam-fullscreen .fs-img-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-height: 0;
  }
  #cam-fullscreen .fs-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: grayscale(0.45) contrast(1.15) brightness(0.75) sepia(0.15);
    display: block;
  }
  #cam-fullscreen .fs-scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,255,65,0.025) 3px, rgba(0,255,65,0.025) 4px
    );
    pointer-events: none;
    z-index: 5;
  }

  .cam-cell img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(0.45) contrast(1.15) brightness(0.7) sepia(0.15);
  }

  .cam-cell::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,255,65,0.025) 3px, rgba(0,255,65,0.025) 4px
    );
    pointer-events: none;
    z-index: 3;
  }

  .cam-label {
    position: absolute;
    bottom: 4px; left: 5px;
    font-size: 0.48rem;
    color: var(--green-cam);
    z-index: 4;
    text-shadow: 0 0 4px var(--green-cam);
  }

  .cam-rec {
    position: absolute;
    top: 4px; right: 5px;
    font-size: 0.48rem;
    color: var(--red);
    z-index: 4;
    animation: blink 1.5s infinite;
  }

  .cam-close-bar {
    padding: 6px 10px;
    background: #050505;
    border-top: 1px solid #111;
    display: flex;
    justify-content: flex-end;
    flex-shrink: 0;
  }
  .cam-close-bar button {
    padding: 9px 20px;
    background: #1a0808;
    border: 1px solid var(--red);
    color: var(--red);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 2px;
  }

  /* =========================================================
     DOOR SCENE
  ========================================================= */
  #scene-dver-side {
    display: none;
    position: absolute;
    top: var(--top-h);
    left: 0; right: 0;
    bottom: var(--hud-h);
    z-index: 15;
    background: #000;
  }
  #scene-dver-side.active { display: block; }
  #scene-dver-side > img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* WINDOW SCENE */
  #scene-okno {
    display: none;
    position: absolute;
    top: var(--top-h);
    left: 0; right: 0;
    bottom: var(--hud-h);
    z-index: 15;
    background: #000;
  }
  #scene-okno.active { display: block; }
  #scene-okno > img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .door-scene-btns {
    position: absolute;
    bottom: 14px;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 9px;
    padding: 0 18px;
  }

  .door-scene-btn {
    width: 100%;
    max-width: 340px;
    padding: 14px 20px;
    background: rgba(0,0,0,0.88);
    border: 1px solid #444;
    color: #ccc;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 3px;
    text-align: center;
  }
  .door-scene-btn.primary   { border-color: var(--red); color: var(--red); }
  .door-scene-btn.secondary { border-color: #3498db; color: #3498db; }
  .door-scene-btn.muted     { border-color: #2a2a2a; color: #555; font-size: 0.62rem; }
  .door-scene-btn:active    { opacity: 0.65; }

  /* =========================================================
     PEEPHOLE
  ========================================================= */
  #peephole-overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 60;
    background: #000;
    flex-direction: column;
    align-items: stretch;
    justify-content: stretch;
  }
  #peephole-overlay.active { display: flex; }
  #peephole-overlay > img {
    flex: 1;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    min-height: 0;
  }

  .peephole-close {
    flex-shrink: 0;
    padding: 14px;
    background: rgba(0,0,0,0.95);
    border: none;
    border-top: 1px solid #222;
    color: #888;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    letter-spacing: 2px;
    text-align: center;
    touch-action: manipulation;
  }
  .peephole-close:active { background: #111; color: #fff; }

  /* =========================================================
     BOTTOM HUD
  ========================================================= */
  #hud {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: var(--hud-h);
    background: rgba(0,0,0,0.97);
    border-top: 1px solid #1a1a1a;
    display: flex;
    flex-direction: column;
    z-index: 20;
    padding: 8px 10px 12px;
    gap: 8px;
  }

  .hud-water-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .water-label {
    font-size: 0.56rem;
    color: var(--water-color);
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .water-bar {
    flex: 1;
    height: 7px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    overflow: hidden;
  }

  .water-fill {
    height: 100%;
    background: var(--water-color);
    transition: width 0.5s, background 0.5s;
    box-shadow: 0 0 5px rgba(52,152,219,0.5);
  }

  .water-fill.warn {
    background: #e74c3c !important;
    animation: water-warn 0.5s infinite;
  }

  .water-pct {
    font-size: 0.55rem;
    color: var(--water-color);
    min-width: 30px;
    text-align: right;
  }

  .hud-btn-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    flex: 1;
  }

  .hud-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    background: #0d0d0d;
    border: 1px solid #252525;
    color: #888;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.5px;
    cursor: pointer;
    border-radius: 3px;
    padding: 5px 2px;
    text-transform: uppercase;
    -webkit-user-select: none;
    user-select: none;
    transition: opacity 0.15s;
  }

  .hud-btn .btn-icon { font-size: 1.15rem; line-height: 1; }
  .hud-btn:active { opacity: 0.6; }

  .hud-btn.cam-btn  { border-color: #0f2e0f; color: var(--green-cam); }
  .hud-btn.door-btn { border-color: #2e0f0f; color: #d07070; }
  .hud-btn.win-btn  { border-color: #0f1e2e; color: #70a0d0; }
  .hud-btn.back-btn { border-color: #1e1e0f; color: #909060; }

  .hud-btn.door-btn.closed {
    background: rgba(192,57,43,0.18);
    border-color: var(--red);
    color: var(--red);
  }
  .hud-btn.win-btn.closed {
    background: rgba(52,100,180,0.18);
    border-color: #3464b4;
    color: #6090d0;
  }

  /* =========================================================
     SCREAMER
  ========================================================= */
  #screamer {
    display: none;
    position: fixed; inset: 0;
    z-index: 999;
    background: #000;
    align-items: center;
    justify-content: center;
  }
  #screamer.active { display: flex; }
  #screamer img {
    width: 100%; height: 100%;
    object-fit: cover;
    animation: scream-shake 0.08s infinite;
  }

  /* =========================================================
     WIN / LOSE
  ========================================================= */
  #overlay-screen {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.94);
    z-index: 998;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 30px;
    text-align: center;
  }
  #overlay-screen.active { display: flex; }

  #overlay-screen h2 {
    font-family: 'Creepster', cursive;
    font-size: clamp(2.4rem, 13vw, 5rem);
    text-shadow: 0 0 40px currentColor;
  }
  #overlay-screen.win  h2 { color: var(--amber); }
  #overlay-screen.lose h2 { color: var(--red); }

  #overlay-screen p {
    color: #666;
    font-size: clamp(0.62rem, 3vw, 0.88rem);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  #overlay-screen button {
    margin-top: 16px;
    padding: 16px 40px;
    background: transparent;
    border: 2px solid var(--amber);
    color: var(--amber);
    font-family: 'Russo One', sans-serif;
    font-size: clamp(0.9rem, 4vw, 1.1rem);
    cursor: pointer;
    letter-spacing: 3px;
    border-radius: 2px;
  }
  #overlay-screen button:active { background: var(--amber); color: #000; }

  /* =========================================================
     TRANSITION
  ========================================================= */
  .scene-transition {
    position: absolute; inset: 0;
    background: #000;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s;
  }
  .scene-transition.flash { opacity: 1; }

  /* =========================================================
     ANIMATIONS
  ========================================================= */
  @keyframes flicker {
    0%,100%{opacity:1}92%{opacity:1}93%{opacity:.4}94%{opacity:1}96%{opacity:.6}97%{opacity:1}
  }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
  @keyframes water-warn {
    0%,100%{box-shadow:0 0 5px rgba(231,76,60,.4)}
    50%    {box-shadow:0 0 14px rgba(231,76,60,.9)}
  }
  @keyframes scream-shake {
    0%  {transform:translate(-5px,-4px) rotate(-.5deg)}
    25% {transform:translate(5px,4px) rotate(.5deg)}
    50% {transform:translate(-4px,5px) rotate(-.3deg)}
    75% {transform:translate(4px,-5px) rotate(.3deg)}
    100%{transform:translate(0)}
  }
  @keyframes glitch {
    0%  {transform:translate(-2px,1px) skewX(1deg);  filter:hue-rotate(90deg)  grayscale(.45) contrast(1.15) brightness(.7)}
    50% {transform:translate(2px,-1px) skewX(-1deg); filter:hue-rotate(-90deg) grayscale(.45) contrast(1.15) brightness(.7)}
    100%{transform:translate(0); filter:grayscale(.45) contrast(1.15) brightness(.7)}
  }
  .glitch-cam img { animation: glitch 0.18s steps(2) 3; }

  /* =========================================================
     PC ADAPTATION
  ========================================================= */
  @media (min-width: 768px) {
    :root {
      --hud-h: 90px;
      --top-h: 52px;
    }

    #game {
      max-width: 1200px;
      margin: 0 auto;
    }

    .hud-btn {
      font-size: 0.65rem;
      padding: 8px 4px;
      gap: 4px;
    }
    .hud-btn .btn-icon { font-size: 1.4rem; }
    .hud-btn:hover { background: #1a1a1a; border-color: #444; opacity: 1; }
    .hud-btn.cam-btn:hover  { background: #0a1a0a; border-color: var(--green-cam); }
    .hud-btn.door-btn:hover { background: #1a0808; border-color: var(--red); }
    .hud-btn.win-btn:hover  { background: #080e1a; border-color: #3498db; }
    .hud-btn.back-btn:hover { background: #111100; border-color: #888860; }

    .door-scene-btn { font-size: 0.85rem; padding: 16px 24px; }
    .door-scene-btn:hover { opacity: 0.85; }

    .cam-cell:hover { box-shadow: 0 0 0 2px var(--green-cam); }

    #menu .start-btn:hover { background: var(--red); color: #fff; }

    .granny-name { font-size: 0.7rem; }
    .granny-loc  { font-size: 0.62rem; }
    .topbar-time { font-size: 1.2rem; }

    .water-label { font-size: 0.68rem; }
    .water-pct   { font-size: 0.65rem; }

    /* Камеры в 3 колонки на ПК */
    .cam-grid {
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }
    .cam-cell:nth-child(5) { grid-column: 3 / 4; grid-row: 1 / 3; }

    #menu h1 { font-size: 5rem; }
    #menu .subtitle { font-size: 1rem; }
    #menu .night-info { font-size: 1.6rem; }
    #menu .start-btn { font-size: 1.3rem; padding: 18px 56px; }
  }

  @media (min-width: 1024px) {
    #game { max-width: 1400px; }
    .hud-btn-row { gap: 10px; }
  }
</style>
</head>
<body>

<!-- ======================== MENU ======================== -->
<div id="menu">
  <h1>5 НОЧЕЙ<br>С БАБКАМИ</h1>
  <div class="subtitle">Ночь в подъезде</div>
  <div class="night-info">НОЧЬ 1 / 6</div>
  <button class="start-btn" id="start-btn">▶ НАЧАТЬ</button>

  <!-- Сложность -->
  <div class="difficulty-wrap">
    <div class="diff-label">СЛОЖНОСТЬ</div>
    <div class="diff-btns">
      <button class="diff-btn active" id="diff-easy"   onclick="setDiff('easy')">ЛЁГКАЯ</button>
      <button class="diff-btn"        id="diff-normal" onclick="setDiff('normal')">СРЕДНЯЯ</button>
      <button class="diff-btn"        id="diff-hard"   onclick="setDiff('hard')">ХАРДКОР</button>
    </div>
  </div>

  <div class="menu-babs">
    <img src="img/Pishik%20A.png" alt="">
    <img src="img/Pishik%20B.png" alt="">
  </div>
</div>

<!-- ======================== GAME ======================== -->
<div id="game">

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="granny-status">
      <div class="granny-dot blue"></div>
      <div class="granny-info">
        <div class="granny-name blue">СИНЯЯ</div>
        <div class="granny-loc" id="blue-loc">Лавочка</div>
      </div>
    </div>
    <div class="granny-status">
      <div class="granny-dot red"></div>
      <div class="granny-info">
        <div class="granny-name red">КРАСНАЯ</div>
        <div class="granny-loc" id="red-loc">Пыжик</div>
      </div>
    </div>
    <div class="topbar-time" id="hud-time">00:00</div>
  </div>

  <!-- MAIN APARTMENT SCENE -->
  <div id="apartment-view">
    <img class="scene-img" id="main-scene" src="img/Table.png" alt="">
  </div>

  <!-- CAMERA PANEL -->
  <div id="camera-panel">
    <div class="cam-header">
      <span class="blink">● REC</span>
      <span>НАБЛЮДЕНИЕ</span>
      <span id="cam-time-display" style="margin-left:auto">00:00</span>
    </div>
    <div class="cam-grid" id="cam-grid"></div>
  </div>

  <!-- DOOR SIDE SCENE -->
  <div id="scene-dver-side">
    <img id="door-scene-img" src="img/Dver%20Open.png" alt="">
    <div class="door-scene-btns">
      <button class="door-scene-btn primary" id="door-toggle-btn" onclick="toggleDoor()" style="touch-action:manipulation">🔒 ЗАКРЫТЬ ДВЕРЬ</button>
      <button class="door-scene-btn secondary" id="peephole-btn" onclick="lookThroughPeephole()" style="display:none;touch-action:manipulation">👁 ПОСМОТРЕТЬ В ГЛАЗОК</button>
      <button class="door-scene-btn muted" onclick="backToTable()" style="touch-action:manipulation">← НАЗАД</button>
    </div>
  </div>

  <!-- WINDOW SCENE -->
  <div id="scene-okno">
    <img id="window-scene-img" src="img/Window%20Open.png" alt="">
    <div class="door-scene-btns">
      <button class="door-scene-btn primary" id="window-toggle-btn" onclick="toggleWindow()" style="touch-action:manipulation">🔒 ЗАКРЫТЬ ОКНО</button>
      <button class="door-scene-btn muted" onclick="backToTable()" style="touch-action:manipulation">← НАЗАД</button>
    </div>
  </div>

  <!-- PEEPHOLE — полный экран, картинка занимает всё -->
  <div id="peephole-overlay">
    <img id="peephole-img" src="" alt="">
    <button class="peephole-close" id="peephole-close-btn">← ОТОЙТИ ОТ ДВЕРИ</button>
  </div>

  <!-- TRANSITION FLASH -->
  <div class="scene-transition" id="transition"></div>

  <!-- BOTTOM HUD -->
  <div id="hud">
    <div class="hud-water-row">
      <span class="water-label">💧 ВОДА</span>
      <div class="water-bar">
        <div class="water-fill" id="water-fill" style="width:100%"></div>
      </div>
      <span class="water-pct" id="water-pct">100%</span>
    </div>
    <div class="hud-btn-row">
      <button class="hud-btn cam-btn" onclick="toggleCameras()">
        <span class="btn-icon">📷</span>КАМЕРЫ
      </button>
      <button class="hud-btn door-btn" id="door-hud-btn" onclick="goToDoor()">
        <span class="btn-icon">🚪</span>ДВЕРЬ
      </button>
      <button class="hud-btn win-btn" id="win-hud-btn" onclick="handleWindowBtn()">
        <span class="btn-icon">🪟</span>ОКНО
      </button>
      <button class="hud-btn back-btn" id="back-hud-btn" onclick="backToTable()" style="display:none">
        <span class="btn-icon">🖥</span>СТОЛ
      </button>
    </div>
  </div>

</div>

<!-- MUSIC -->
<audio id="bg-music" src="OST-2 — Resident evil.mp3.mp3" loop preload="auto"></audio>

<!-- FULLSCREEN CAMERA -->
<div id="cam-fullscreen">
  <div class="fs-header">
    <span class="fs-label blink-green">● REC &nbsp;<span id="fs-cam-label">КАМ1·ПЫЖИК</span></span>
    <button class="fs-close" id="fs-close-btn">✕ ЗАКРЫТЬ</button>
  </div>
  <div class="fs-img-wrap" style="position:relative">
    <img id="fs-cam-img" src="" alt="">
    <div class="fs-scanlines"></div>
  </div>
</div>

<!-- SCREAMER -->
<div id="screamer">
  <img id="screamer-img" src="" alt="">
</div>

<!-- OVERLAY WIN/LOSE -->
<div id="overlay-screen">
  <h2 id="overlay-title">GAME OVER</h2>
  <p id="overlay-sub">ОНА ДОБРАЛАСЬ ДО ТЕБЯ</p>
  <button onclick="restartGame()">↺ ЕЩЁ РАЗ</button>
</div>

<script>
// ============================================================
//  CONSTANTS
// ============================================================
const LOCATIONS = ['Пыжик','Лавочка','Вход','Лифт','2 этаж','Дверь','Окно'];
const LOC = { PISHIK:0, LAVOCHKA:1, VHOD:2, LIFT:3, ET2:4, DVER:5, OKNO:6 };

const CAM_IMGS = {
  0: { empty:'img/Pishik.png',   A:'img/Pishik%20A.png',   B:'img/Pishik%20B.png'           },
  1: { empty:'img/Lavochka.png', A:'img/Lavochka%20A.png', B:'img/Lavochka%20B.png', AB:'img/Lavochka%20AB.jpg' },
  2: { empty:'img/Vhod.jpg',     A:'img/Vhod%20A.jpg',     B:'img/Vhod%20B.jpg'             },
  3: { empty:'img/Lift.jpeg',    A:'img/Lift%20A.png',     B:'img/Lift%20B.png'             },
  4: { empty:'img/2Et.png',      A:'img/2Et%20A.png',      B:'img/2Et%20B.png'              },
};

const CAM_LABELS = ['КАМ1·ПЫЖИК','КАМ2·ЛАВОЧКА','КАМ3·ВХОД','КАМ4·ЛИФТ','КАМ5·2ЭТ'];

// Настройки сложности
const DIFF_SETTINGS = {
  easy:   { minD: 18, maxD: 35, fwdBonus: 0,    retreatMs: 30000, attackMin: 8,  attackMax: 14 },
  normal: { minD: 8,  maxD: 18, fwdBonus: 0.15, retreatMs: 22000, attackMin: 5,  attackMax: 10 },
  hard:   { minD: 3,  maxD: 9,  fwdBonus: 0.30, retreatMs: 15000, attackMin: 3,  attackMax: 6  },
};
let difficulty = 'easy';

function setDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('diff-' + d).classList.add('active');
}

// ============================================================
//  STATE
// ============================================================
let state = {};
let gameLoopId   = null;
let moveTimeout  = null;
let camUpdateId  = null;

function freshState() {
  return {
    water: 100,
    doorClosed: false,
    windowClosed: false,
    currentView: 'table',
    cameraOpen: false,
    gameRunning: false,
    bluePos: LOC.LAVOCHKA,
    redPos:  LOC.PISHIK,
    nightHour: 0,
    secondsInHour: 0,
    bluePending: false,
    redPending: false,
  };
}

// ============================================================
//  START / RESTART
// ============================================================
function startGame() {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  state = freshState();
  buildCameraGrid();
  showView('table');
  state.gameRunning = true;
  gameLoopId = setInterval(gameTick, 1000);
  scheduleMoves();
  // Музыка
  const music = document.getElementById('bg-music');
  if (music) { music.currentTime = 0; music.volume = 0.45; music.play().catch(()=>{}); }
}

function restartGame() {
  clearAllTimers();
  document.getElementById('overlay-screen').className = '';
  document.getElementById('overlay-screen').style.display = 'none';
  document.getElementById('screamer').className = '';
  document.getElementById('screamer').style.display = '';
  startGame();
}

function clearAllTimers() {
  clearInterval(gameLoopId);
  clearTimeout(moveTimeout);
  clearInterval(camUpdateId);
  // Стоп музыка
  const music = document.getElementById('bg-music');
  if (music) music.pause();
}

// ============================================================
//  GAME LOOP
// ============================================================
function gameTick() {
  if (!state.gameRunning) return;
  state.secondsInHour++;
  if (state.secondsInHour >= 120) {
    state.secondsInHour = 0;
    state.nightHour++;
    if (state.nightHour >= 6) { winGame(); return; }
  }
  drainWater();
  updateTimeUI();
  updateWaterUI();
  checkAttack();
}

// ============================================================
//  WATER
// ============================================================
function drainWater() {
  let d = 0.025;
  if (state.doorClosed)   d += 0.18;
  if (state.windowClosed) d += 0.18;
  state.water = Math.max(0, state.water - d);
}

// ============================================================
//  GRANNY AI
// ============================================================
function scheduleMoves() {
  const cfg = DIFF_SETTINGS[difficulty];
  // Динамика: чем меньше воды — тем быстрее ходят
  const waterFactor = 1 - (state.water / 100) * 0.5; // 1.0 → 0.5
  const minD = Math.max(2, cfg.minD * waterFactor);
  const maxD = Math.max(4, cfg.maxD * waterFactor);
  const delay = randInt(Math.round(minD), Math.round(maxD)) * 1000;
  moveTimeout = setTimeout(() => {
    if (!state.gameRunning) return;
    moveGrannies();
    scheduleMoves();
  }, delay);
}

function moveGrannies() {
  moveOne('blue');
  moveOne('red');
  updateLocLabels();
  if (state.cameraOpen) updateCamImages();
  if (state.currentView === 'door') {
    const overlay = document.getElementById('peephole-overlay');
    if (!overlay.classList.contains('active')) {
      document.getElementById('door-scene-img').src = getDoorImg();
    }
  }
  if (state.currentView === 'window') {
    refreshWindowUI();
  }
}

function moveOne(who) {
  const cfg = DIFF_SETTINGS[difficulty];
  const wf  = 1 - state.water / 100;
  const fwd = Math.min(0.85, 0.28 + wf * 0.52 + cfg.fwdBonus);
  const sty = Math.max(0.05, 0.48 - wf * 0.28);
  const r   = Math.random();
  if      (r < fwd)       stepFwd(who);
  else if (r < fwd + sty) { /* stay */ }
  else                    stepBck(who);
}

function stepFwd(who) {
  const pos   = who === 'blue' ? state.bluePos : state.redPos;
  const other = who === 'blue' ? state.redPos  : state.bluePos;
  // На 2 этаже — выбираем финальное место (дверь или окно)
  if (pos >= LOC.ET2) {
    const dest = chooseFinal(who);
    // Не занято другой бабкой
    if (dest !== other) setPos(who, dest);
    return;
  }
  const next = pos + 1;
  // Лавочка — единственное место где обе могут быть
  if (next === LOC.LAVOCHKA) { setPos(who, next); return; }
  // Иначе — не занято
  if (next !== other) setPos(who, next);
}

function stepBck(who) {
  const pos   = who === 'blue' ? state.bluePos : state.redPos;
  const other = who === 'blue' ? state.redPos  : state.bluePos;
  if (pos <= LOC.PISHIK) return;
  const prev = pos - 1;
  // Лавочка — обе могут быть
  if (prev === LOC.LAVOCHKA) { setPos(who, prev); return; }
  if (prev !== other) setPos(who, prev);
}

function setPos(who, p) {
  if (who === 'blue') state.bluePos = p;
  else                state.redPos  = p;
}

function chooseFinal(who) {
  return who === 'blue'
    ? (Math.random() < 0.70 ? LOC.DVER : LOC.OKNO)
    : (Math.random() < 0.70 ? LOC.OKNO : LOC.DVER);
}

// ============================================================
//  ATTACK
// ============================================================
function checkAttack() {
  tryAttack('blue', state.bluePos, 'bluePending', 'A', 5, 10);
  tryAttack('red',  state.redPos,  'redPending',  'B', 3, 7);
}

function tryAttack(who, pos, flag, scream, minD, maxD) {
  if (state[flag]) return;
  const cfg = DIFF_SETTINGS[difficulty];
  const atDoor = pos === LOC.DVER && !state.doorClosed;
  const atWin  = pos === LOC.OKNO && !state.windowClosed;
  const blockedDoor = pos === LOC.DVER && state.doorClosed;
  const blockedWin  = pos === LOC.OKNO && state.windowClosed;

  if (blockedDoor || blockedWin) {
    state[flag] = true;
    setTimeout(() => {
      if (!state.gameRunning) return;
      const cur = who === 'blue' ? state.bluePos : state.redPos;
      const stillBlocked = (cur === LOC.DVER && state.doorClosed) ||
                           (cur === LOC.OKNO && state.windowClosed);
      if (stillBlocked) {
        // Уходит на 2Эт или Лифт
        const dest = Math.random() < 0.5 ? LOC.ET2 : LOC.LIFT;
        const other = who === 'blue' ? state.redPos : state.bluePos;
        setPos(who, dest === other ? LOC.LIFT : dest);
        updateLocLabels();
        if (state.cameraOpen) updateCamImages();
        if (state.currentView === 'door') document.getElementById('door-scene-img').src = getDoorImg();
        if (state.currentView === 'window') refreshWindowUI();
      }
      state[flag] = false;
    }, randInt(20000, 30000));
    return;
  }

  if (!atDoor && !atWin) return;
  state[flag] = true;
  setTimeout(() => {
    if (!state.gameRunning) return;
    const cur   = who === 'blue' ? state.bluePos : state.redPos;
    const still = (cur === LOC.DVER && !state.doorClosed) ||
                  (cur === LOC.OKNO && !state.windowClosed);
    if (still) triggerScreamer(scream);
    else state[flag] = false;
  }, randInt(cfg.attackMin, cfg.attackMax) * 1000);
}

// ============================================================
//  SCREAMER / END
// ============================================================
function triggerScreamer(who) {
  if (!state.gameRunning) return;
  state.gameRunning = false;
  clearAllTimers();
  const el  = document.getElementById('screamer');
  const img = document.getElementById('screamer-img');
  img.src = `img/Scream%20${who}.png`;
  el.classList.add('active');
  playScreamSound();
  setTimeout(() => { el.classList.remove('active'); showLose(who); }, 3000);
}

function showLose(who) {
  document.getElementById('overlay-title').textContent = 'ОНА ДОБРАЛАСЬ!';
  document.getElementById('overlay-sub').textContent =
    who === 'A' ? 'СИНЯЯ БАБКА ПОБЕДИЛА' : 'КРАСНАЯ БАБКА ПОБЕДИЛА';
  const ov = document.getElementById('overlay-screen');
  ov.className = 'active lose';
  ov.style.display = 'flex';
}

function winGame() {
  state.gameRunning = false;
  clearAllTimers();
  document.getElementById('overlay-title').textContent = 'РАССВЕТ!';
  document.getElementById('overlay-sub').textContent = 'ТЫ ПЕРЕЖИЛ ЭТУ НОЧЬ';
  const ov = document.getElementById('overlay-screen');
  ov.className = 'active win';
  ov.style.display = 'flex';
}

// ============================================================
//  VIEW MANAGEMENT
// ============================================================
function showView(view) {
  state.currentView = view;
  const dver    = document.getElementById('scene-dver-side');
  const okno    = document.getElementById('scene-okno');
  const cam     = document.getElementById('camera-panel');
  const main    = document.getElementById('main-scene');
  const backBtn = document.getElementById('back-hud-btn');

  dver.classList.remove('active');
  okno.classList.remove('active');
  cam.classList.remove('active');
  if (state.cameraOpen) { clearInterval(camUpdateId); state.cameraOpen = false; }

  if (view === 'table') {
    main.src = 'img/Table.png';
    backBtn.style.display = 'none';
  } else if (view === 'door') {
    dver.classList.add('active');
    backBtn.style.display = 'flex';
    refreshDoorUI();
  } else if (view === 'window') {
    okno.classList.add('active');
    backBtn.style.display = 'flex';
    refreshWindowUI();
  }
}

function goToDoor() {
  playClick();
  flashTransition(() => showView('door'));
}

function goToWindow() {
  playClick();
  flashTransition(() => showView('window'));
}

function backToTable() {
  playClick();
  document.getElementById('peephole-overlay').classList.remove('active');
  flashTransition(() => showView('table'));
}

// ============================================================
//  DOOR
// ============================================================
function toggleDoor() {
  playClick();
  state.doorClosed = !state.doorClosed;
  state.bluePending = false;
  state.redPending  = false;
  refreshDoorUI();
  const btn = document.getElementById('door-hud-btn');
  state.doorClosed ? btn.classList.add('closed') : btn.classList.remove('closed');
}

function getDoorImg() {
  if (state.doorClosed) return 'img/Dver.jpg';
  // дверь открыта — показываем бабку если стоит у двери
  if (state.bluePos === LOC.DVER) return 'img/Dver%20Open%20A.png';
  if (state.redPos  === LOC.DVER) return 'img/Dver%20Open%20B.png';
  return 'img/Dver%20Open.png';
}

function refreshDoorUI() {
  const toggleBtn   = document.getElementById('door-toggle-btn');
  const peepholeBtn = document.getElementById('peephole-btn');
  const doorImg     = document.getElementById('door-scene-img');

  // Обновляем картинку двери
  doorImg.src = getDoorImg();

  toggleBtn.textContent = state.doorClosed ? '🔓 ОТКРЫТЬ ДВЕРЬ' : '🔒 ЗАКРЫТЬ ДВЕРЬ';
  toggleBtn.className   = state.doorClosed ? 'door-scene-btn secondary' : 'door-scene-btn primary';
  peepholeBtn.style.display = state.doorClosed ? 'block' : 'none';
}

function lookThroughPeephole() {
  if (!state.doorClosed) return;
  document.getElementById('door-scene-img').src = 'img/Dver%20Side.jpg';
  setTimeout(() => {
    let src = 'img/Glass%20D.png';
    if      (state.bluePos === LOC.DVER) src = 'img/Glass%20A.png';
    else if (state.redPos  === LOC.DVER) src = 'img/Glass%20B.png';
    const img = document.getElementById('peephole-img');
    img.src = src;
    document.getElementById('peephole-overlay').classList.add('active');
  }, 300);
}

function closePeephole() {
  document.getElementById('peephole-overlay').classList.remove('active');
  document.getElementById('door-scene-img').src = getDoorImg();
}

// ============================================================
//  WINDOW
// ============================================================
function getWindowImg() {
  if (state.windowClosed) return 'img/Window.png';
  if (state.bluePos === LOC.OKNO) return 'img/Window%20Open%20A.png';
  if (state.redPos  === LOC.OKNO) return 'img/Window%20Open%20B.png';
  return 'img/Window%20Open.png';
}

function refreshWindowUI() {
  const img = document.getElementById('window-scene-img');
  const btn = document.getElementById('window-toggle-btn');
  const hudBtn = document.getElementById('win-hud-btn');
  img.src = getWindowImg();
  btn.textContent = state.windowClosed ? '🔓 ОТКРЫТЬ ОКНО' : '🔒 ЗАКРЫТЬ ОКНО';
  btn.className   = state.windowClosed ? 'door-scene-btn secondary' : 'door-scene-btn primary';
  state.windowClosed ? hudBtn.classList.add('closed') : hudBtn.classList.remove('closed');
}

function toggleWindow() {
  playClick();
  state.windowClosed = !state.windowClosed;
  state.bluePending = false;
  state.redPending  = false;
  refreshWindowUI();
}

function handleWindowBtn() {
  goToWindow();
}

// ============================================================
//  CAMERAS
// ============================================================
function buildCameraGrid() {
  const grid = document.getElementById('cam-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const cell = document.createElement('div');
    cell.className = 'cam-cell';
    cell.id = `cam-${i}`;
    cell.innerHTML = `
      <img id="cam-img-${i}" src="${getCamImg(i)}" alt="">
      <div class="cam-label">${CAM_LABELS[i]}</div>
      <div class="cam-rec">● REC</div>`;
    cell.addEventListener('click', () => openFullscreenCam(i));
    grid.appendChild(cell);
  }
}

function getCamImg(i) {
  const imgs = CAM_IMGS[i];
  const bH   = state.bluePos === i;
  const rH   = state.redPos  === i;
  if (i === LOC.LAVOCHKA && bH && rH) return imgs.AB || imgs.empty;
  if (bH) return imgs.A;
  if (rH) return imgs.B;
  return imgs.empty;
}

function updateCamImages() {
  for (let i = 0; i < 5; i++) {
    const img  = document.getElementById(`cam-img-${i}`);
    const cell = document.getElementById(`cam-${i}`);
    if (!img) continue;
    img.src = getCamImg(i);
    if (Math.random() < 0.1) {
      cell.classList.add('glitch-cam');
      setTimeout(() => cell.classList.remove('glitch-cam'), 320);
    }
  }
}

function toggleCameras() {
  playClick();
  if (state.cameraOpen) {
    closeCameras();
  } else {
    state.cameraOpen = true;
    state.currentView = 'cameras';
    document.getElementById('scene-dver-side').classList.remove('active');
    updateCamImages();
    document.getElementById('camera-panel').classList.add('active');
    document.getElementById('back-hud-btn').style.display = 'flex';
    camUpdateId = setInterval(updateCamImages, 3500);
  }
}

function closeCameras() {
  state.cameraOpen = false;
  document.getElementById('camera-panel').classList.remove('active');
  closeFullscreenCam();
  clearInterval(camUpdateId);
  if (state.currentView === 'cameras') {
    state.currentView = 'table';
    document.getElementById('back-hud-btn').style.display = 'none';
  }
}

let fsCamIndex = -1;
let fsUpdateId = null;

function openFullscreenCam(i) {
  fsCamIndex = i;
  const fs = document.getElementById('cam-fullscreen');
  document.getElementById('fs-cam-label').textContent = CAM_LABELS[i];
  document.getElementById('fs-cam-img').src = getCamImg(i);
  fs.classList.add('active');
  clearInterval(fsUpdateId);
  fsUpdateId = setInterval(() => {
    if (fsCamIndex < 0) return;
    document.getElementById('fs-cam-img').src = getCamImg(fsCamIndex);
  }, 3500);
}

function closeFullscreenCam() {
  fsCamIndex = -1;
  clearInterval(fsUpdateId);
  document.getElementById('cam-fullscreen').classList.remove('active');
}

// ============================================================
//  UI
// ============================================================
function updateTimeUI() {
  const h = state.nightHour;
  const m = Math.floor((state.secondsInHour / 120) * 60);
  const s = `0${h}:${m < 10 ? '0'+m : m}`;
  document.getElementById('hud-time').textContent = s;
  document.getElementById('cam-time-display').textContent = s;
}

function updateWaterUI() {
  const pct  = Math.round(state.water);
  const fill = document.getElementById('water-fill');
  const pctEl = document.getElementById('water-pct');
  fill.style.width = pct + '%';
  pctEl.textContent = pct + '%';
  if (pct <= 20) {
    fill.classList.add('warn');
    pctEl.style.color = '#e74c3c';
  } else {
    fill.classList.remove('warn');
    pctEl.style.color = 'var(--water-color)';
  }
}

function updateLocLabels() {
  document.getElementById('blue-loc').textContent = LOCATIONS[state.bluePos];
  document.getElementById('red-loc').textContent  = LOCATIONS[state.redPos];
}

// ============================================================
//  SOUND
// ============================================================
function playScreamSound() {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(60, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(500, ctx.currentTime + 0.4);
    gain.gain.setValueAtTime(0.45, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 2.5);
    osc.start(); osc.stop(ctx.currentTime + 2.5);
  } catch(e){}
}

function playClick() {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.value = 110;
    gain.gain.setValueAtTime(0.07, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.07);
    osc.start(); osc.stop(ctx.currentTime + 0.09);
  } catch(e){}
}

// ============================================================
//  UTILS
// ============================================================
function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

function flashTransition(cb) {
  const el = document.getElementById('transition');
  el.classList.add('flash');
  setTimeout(() => { cb(); el.classList.remove('flash'); }, 130);
}

// Block scroll/zoom on mobile (only inside game, not menu buttons)
document.addEventListener('touchmove', e => {
  if (e.target.tagName !== 'BUTTON') e.preventDefault();
}, { passive: false });

// Start button — работает и на touch, и на click
(function() {
  const btn = document.getElementById('start-btn');
  function handleStart(e) {
    e.preventDefault();
    e.stopPropagation();
    startGame();
  }
  btn.addEventListener('touchend', handleStart, { passive: false });
  btn.addEventListener('click', handleStart);

  // Закрытие полноэкранной камеры
  const fsClose = document.getElementById('fs-close-btn');
  fsClose.addEventListener('touchend', (e) => { e.preventDefault(); closeFullscreenCam(); }, { passive: false });
  fsClose.addEventListener('click', closeFullscreenCam);

  // Закрытие глазка
  const phClose = document.getElementById('peephole-close-btn');
  function handlePhClose(e) { e.preventDefault(); closePeephole(); }
  phClose.addEventListener('touchend', handlePhClose, { passive: false });
  phClose.addEventListener('click', handlePhClose);
})();
</script>
