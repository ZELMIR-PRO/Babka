<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>5 Ночей с Бабками</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Russo+One&family=Share+Tech+Mono&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: #000;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    height: 100dvh;
  }

  /* МЕНЮ */
  #menu {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }

  #menu h1 {
    font-family: 'Creepster', cursive;
    font-size: clamp(2.4rem, 11vw, 5rem);
    color: #c0392b;
    text-shadow: 0 0 40px rgba(192,57,43,0.8);
    text-align: center;
    animation: flicker 4s infinite;
  }

  #menu .start-btn {
    margin-top: 30px;
    padding: 16px 44px;
    background: transparent;
    border: 2px solid #c0392b;
    color: #c0392b;
    font-family: 'Russo One', sans-serif;
    font-size: 1.3rem;
    cursor: pointer;
    text-transform: uppercase;
  }

  #menu .start-btn:hover {
    background: #c0392b;
    color: #fff;
  }

  .menu-babs {
    position: absolute;
    bottom: 0;
    display: flex;
    gap: 20px;
    pointer-events: none;
  }

  .menu-babs img {
    height: 200px;
    opacity: 0.6;
  }

  /* ИГРОВОЙ ЭКРАН */
  #game {
    display: none;
    width: 100%;
    height: 100%;
    position: relative;
  }

  /* ВЕРХНЯЯ ПАНЕЛЬ */
  #topbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;
    background: rgba(0,0,0,0.95);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 10px;
    z-index: 20;
    border-bottom: 1px solid #333;
  }

  .granny-status {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
  }

  .granny-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .granny-dot.blue { background: #3498db; }
  .granny-dot.red { background: #c0392b; }

  .granny-name.blue { color: #3498db; }
  .granny-name.red { color: #c0392b; }
  .granny-name { font-size: 12px; }
  .granny-loc { font-size: 10px; color: #666; }

  .topbar-time {
    font-family: 'Russo One', sans-serif;
    font-size: 18px;
    color: #ffb000;
  }

  /* ОСНОВНАЯ СЦЕНА */
  #apartment-view {
    position: absolute;
    top: 50px;
    left: 0;
    right: 0;
    bottom: 115px;
    background: #000;
  }

  #apartment-view img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* СЦЕНА ДВЕРИ */
  #scene-dver-side {
    display: none;
    position: absolute;
    top: 50px;
    left: 0;
    right: 0;
    bottom: 115px;
    background: #000;
    z-index: 15;
  }

  #scene-dver-side.active {
    display: block;
  }

  #scene-dver-side > img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .door-scene-btns {
    position: absolute;
    bottom: 15px;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 0 20px;
  }

  .door-scene-btn {
    width: 100%;
    max-width: 300px;
    padding: 12px;
    background: rgba(0,0,0,0.9);
    border: 1px solid #444;
    color: #ccc;
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    text-transform: uppercase;
    text-align: center;
  }

  .door-scene-btn.primary { border-color: #c0392b; color: #c0392b; }
  .door-scene-btn.secondary { border-color: #3498db; color: #3498db; }

  /* ГЛАЗОК - ПОЛНОСТЬЮ ПЕРЕДЕЛАН */
  #peephole-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  #peephole-overlay.active {
    display: flex;
  }

  .peephole-wrapper {
    position: relative;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    overflow: hidden;
    border: 8px solid #2a2a2a;
    box-shadow: 0 0 0 4px #111, 0 0 0 8px #1a1a1a, 0 0 30px rgba(0,0,0,0.8);
    background: #000;
  }

  .peephole-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .peephole-lens {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.6), inset 0 0 10px rgba(255,255,255,0.2);
    pointer-events: none;
  }

  .peephole-close {
    position: fixed;
    bottom: 130px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 28px;
    background: #111;
    border: 1px solid #555;
    color: #aaa;
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    border-radius: 30px;
    white-space: nowrap;
    z-index: 101;
  }

  .peephole-close:hover {
    background: #222;
  }

  /* КАМЕРЫ */
  #camera-panel {
    display: none;
    position: absolute;
    top: 50px;
    left: 0;
    right: 0;
    bottom: 115px;
    background: #000;
    flex-direction: column;
    z-index: 10;
  }

  #camera-panel.active {
    display: flex;
  }

  .cam-header {
    padding: 8px;
    background: #050505;
    color: #00ff41;
    font-size: 12px;
  }

  .cam-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    padding: 2px;
  }

  .cam-cell {
    background: #000;
    border: 1px solid #222;
    cursor: pointer;
    position: relative;
  }

  .cam-cell:hover {
    border-color: #00ff41;
  }

  .cam-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .cam-label {
    position: absolute;
    bottom: 4px;
    left: 5px;
    font-size: 9px;
    color: #00ff41;
  }

  /* HUD */
  #hud {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 115px;
    background: rgba(0,0,0,0.97);
    border-top: 1px solid #222;
    padding: 10px;
    z-index: 20;
  }

  .water-bar {
    background: #1a1a1a;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .water-fill {
    height: 100%;
    background: #3498db;
    transition: width 0.3s;
  }

  .water-fill.warn {
    background: #e74c3c;
    animation: pulse 0.5s infinite;
  }

  .hud-btn-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 8px;
  }

  .hud-btn {
    padding: 8px;
    background: #0d0d0d;
    border: 1px solid #333;
    color: #888;
    font-family: monospace;
    font-size: 11px;
    cursor: pointer;
    text-align: center;
  }

  .hud-btn.cam-btn { color: #00ff41; border-color: #0a2a0a; }
  .hud-btn.door-btn { color: #d07070; border-color: #2a0a0a; }
  .hud-btn.win-btn { color: #70a0d0; border-color: #0a1a2a; }

  .hud-btn.closed {
    background: rgba(192,57,43,0.2);
    border-color: #c0392b;
    color: #c0392b;
  }

  /* СКРИМЕР */
  #screamer {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 999;
    align-items: center;
    justify-content: center;
  }

  #screamer.active {
    display: flex;
  }

  #screamer img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* WIN/LOSE */
  #overlay-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 998;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 20px;
  }

  #overlay-screen.active {
    display: flex;
  }

  #overlay-screen h2 {
    font-family: 'Creepster', cursive;
    font-size: 48px;
  }

  #overlay-screen.win h2 { color: #ffb000; }
  #overlay-screen.lose h2 { color: #c0392b; }

  #overlay-screen button {
    padding: 15px 40px;
    background: transparent;
    border: 2px solid #ffb000;
    color: #ffb000;
    font-family: 'Russo One', sans-serif;
    font-size: 16px;
    cursor: pointer;
  }

  @keyframes flicker {
    0%,100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.4; }
    94% { opacity: 1; }
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .transition-flash {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }

  .transition-flash.active {
    opacity: 1;
  }
</style>
</head>
<body>

<div id="menu">
  <h1>5 НОЧЕЙ<br>С БАБКАМИ</h1>
  <button class="start-btn" id="startBtn">▶ НАЧАТЬ</button>
  <div class="menu-babs">
    <img src="img/Pishik%20A.png" alt="">
    <img src="img/Pishik%20B.png" alt="">
  </div>
</div>

<div id="game">
  <div id="topbar">
    <div class="granny-status">
      <div class="granny-dot blue"></div>
      <div><div class="granny-name blue">СИНЯЯ</div><div class="granny-loc" id="blueLoc">Лавочка</div></div>
    </div>
    <div class="granny-status">
      <div class="granny-dot red"></div>
      <div><div class="granny-name red">КРАСНАЯ</div><div class="granny-loc" id="redLoc">Пыжик</div></div>
    </div>
    <div class="topbar-time" id="timeDisplay">00:00</div>
  </div>

  <div id="apartment-view">
    <img id="mainScene" src="img/Table.png" alt="">
  </div>

  <div id="scene-dver-side">
    <img id="doorSceneImg" src="img/Dver%20Open.png" alt="">
    <div class="door-scene-btns">
      <button class="door-scene-btn primary" id="doorToggleBtn">🔒 ЗАКРЫТЬ ДВЕРЬ</button>
      <button class="door-scene-btn secondary" id="peepholeActionBtn" style="display:none">👁 ПОСМОТРЕТЬ В ГЛАЗОК</button>
      <button class="door-scene-btn" id="backFromDoorBtn">← НАЗАД</button>
    </div>
  </div>

  <div id="camera-panel">
    <div class="cam-header">● REC НАБЛЮДЕНИЕ <span id="camTime" style="float:right">00:00</span></div>
    <div class="cam-grid" id="camGrid"></div>
  </div>

  <div id="peephole-overlay">
    <div class="peephole-wrapper">
      <img id="peepholeImage" src="img/Glass%20D.png" alt="">
      <div class="peephole-lens"></div>
    </div>
    <button class="peephole-close" id="closePeepholeBtn">ОТОЙТИ ОТ ГЛАЗКА</button>
  </div>

  <div id="hud">
    <div class="water-bar">
      <div class="water-fill" id="waterFill" style="width:100%"></div>
    </div>
    <div class="hud-btn-row">
      <button class="hud-btn cam-btn" id="camBtn">📷 КАМЕРЫ</button>
      <button class="hud-btn door-btn" id="doorNavBtn">🚪 ДВЕРЬ</button>
      <button class="hud-btn win-btn" id="windowNavBtn">🪟 ОКНО</button>
      <button class="hud-btn" id="backTableBtn" style="display:none">🖥 СТОЛ</button>
    </div>
  </div>
</div>

<div id="screamer">
  <img id="screamerImg" src="">
</div>

<div id="overlay-screen">
  <h2 id="overlayTitle">GAME OVER</h2>
  <p id="overlayText"></p>
  <button onclick="location.reload()">↺ ЕЩЁ РАЗ</button>
</div>

<div class="transition-flash" id="transitionFlash"></div>

<script>
// ========== ЛОКАЦИИ ==========
const LOC = {
  PISHIK: 0,
  LAVOCHKA: 1,
  VHOD: 2,
  LIFT: 3,
  ET2: 4,
  DVER: 5,
  OKNO: 6
};

const LOC_NAMES = ['Пыжик', 'Лавочка', 'Вход', 'Лифт', '2 этаж', 'Дверь', 'Окно'];

const CAM_IMGS = {
  0: { empty: 'img/Pishik.png', A: 'img/Pishik%20A.png', B: 'img/Pishik%20B.png' },
  1: { empty: 'img/Lavochka.png', A: 'img/Lavochka%20A.png', B: 'img/Lavochka%20B.png', AB: 'img/Lavocka%20AB.png' },
  2: { empty: 'img/Vhod.jpg', A: 'img/Vhod%20A.jpg', B: 'img/Vhod%20B.jpg' },
  3: { empty: 'img/Lift.jpeg', A: 'img/Lift%20A.png', B: 'img/Lift%20B.png' },
  4: { empty: 'img/2Et.png', A: 'img/2Et%20A.png', B: 'img/2Et%20B.png' }
};

let gameRunning = false;
let state = {
  water: 100,
  doorClosed: false,
  windowClosed: false,
  currentView: 'table',
  bluePos: LOC.LAVOCHKA,
  redPos: LOC.PISHIK,
  hour: 0,
  seconds: 0
};

let gameInterval, moveInterval, camInterval;

// ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function updateUI() {
  // Время
  let minutes = Math.floor((state.seconds / 120) * 60);
  let timeStr = `0${state.hour}:${minutes < 10 ? '0' + minutes : minutes}`;
  document.getElementById('timeDisplay').innerText = timeStr;
  document.getElementById('camTime').innerText = timeStr;
  
  // Локации
  document.getElementById('blueLoc').innerText = LOC_NAMES[state.bluePos];
  document.getElementById('redLoc').innerText = LOC_NAMES[state.redPos];
  
  // Вода
  let pct = Math.floor(state.water);
  document.getElementById('waterFill').style.width = pct + '%';
  if (pct <= 20) {
    document.getElementById('waterFill').classList.add('warn');
  } else {
    document.getElementById('waterFill').classList.remove('warn');
  }
  
  // Кнопки HUD
  let doorBtn = document.getElementById('doorNavBtn');
  let winBtn = document.getElementById('windowNavBtn');
  if (state.doorClosed) doorBtn.classList.add('closed');
  else doorBtn.classList.remove('closed');
  if (state.windowClosed) winBtn.classList.add('closed');
  else winBtn.classList.remove('closed');
}

function flashTransition(callback) {
  let flash = document.getElementById('transitionFlash');
  flash.classList.add('active');
  setTimeout(() => {
    flash.classList.remove('active');
    if (callback) callback();
  }, 150);
}

function showView(view) {
  state.currentView = view;
  let doorScene = document.getElementById('scene-dver-side');
  let camPanel = document.getElementById('camera-panel');
  let mainScene = document.getElementById('mainScene');
  let backBtn = document.getElementById('backTableBtn');
  
  doorScene.classList.remove('active');
  camPanel.classList.remove('active');
  
  if (view === 'table') {
    mainScene.src = 'img/Table.png';
    backBtn.style.display = 'none';
  } else if (view === 'door') {
    doorScene.classList.add('active');
    backBtn.style.display = 'flex';
    updateDoorScene();
  } else if (view === 'window') {
    updateWindowImage();
    backBtn.style.display = 'flex';
  }
}

function updateDoorScene() {
  let img = document.getElementById('doorSceneImg');
  let toggleBtn = document.getElementById('doorToggleBtn');
  let peepBtn = document.getElementById('peepholeActionBtn');
  
  if (state.doorClosed) {
    img.src = 'img/Dver.jpg';
    toggleBtn.innerText = '🔓 ОТКРЫТЬ ДВЕРЬ';
    toggleBtn.className = 'door-scene-btn secondary';
    peepBtn.style.display = 'block';
  } else {
    if (state.bluePos === LOC.DVER) img.src = 'img/Dver%20Open%20A.png';
    else if (state.redPos === LOC.DVER) img.src = 'img/Dver%20Open%20B.png';
    else img.src = 'img/Dver%20Open.png';
    toggleBtn.innerText = '🔒 ЗАКРЫТЬ ДВЕРЬ';
    toggleBtn.className = 'door-scene-btn primary';
    peepBtn.style.display = 'none';
  }
}

function updateWindowImage() {
  let mainImg = document.getElementById('mainScene');
  if (state.windowClosed) {
    mainImg.src = 'img/Window.png';
  } else {
    if (state.bluePos === LOC.OKNO) mainImg.src = 'img/Window%20Open%20A.png';
    else if (state.redPos === LOC.OKNO) mainImg.src = 'img/Window%20Open%20B.png';
    else mainImg.src = 'img/Window%20Open.png';
  }
}

// ========== ГЛАЗОК - РАБОТАЕТ ИДЕАЛЬНО ==========
function lookThroughPeephole() {
  if (!state.doorClosed) return;
  
  // Сначала показываем приближение к двери
  let doorImg = document.getElementById('doorSceneImg');
  doorImg.src = 'img/Dver%20Side.jpg';
  
  // Через 0.4 секунды показываем глазок
  setTimeout(() => {
    let peepImg = document.getElementById('peepholeImage');
    // Выбираем правильную картинку для глазка
    if (state.bluePos === LOC.DVER) {
      peepImg.src = 'img/Glass%20A.png';
    } else if (state.redPos === LOC.DVER) {
      peepImg.src = 'img/Glass%20B.png';
    } else {
      peepImg.src = 'img/Glass%20D.png';
    }
    // Показываем оверлей глазка
    document.getElementById('peephole-overlay').classList.add('active');
  }, 400);
}

function closePeephole() {
  document.getElementById('peephole-overlay').classList.remove('active');
  // Возвращаем обычную картинку двери
  updateDoorScene();
}

// ========== ДВИЖЕНИЕ БАБОК ==========
function moveGranny(which) {
  let pos = which === 'blue' ? state.bluePos : state.redPos;
  let other = which === 'blue' ? state.redPos : state.bluePos;
  let waterFactor = 1 - state.water / 100;
  let forwardChance = 0.35 + waterFactor * 0.5;
  
  let r = Math.random();
  if (r < forwardChance) {
    // Вперёд
    if (pos >= LOC.ET2) {
      // Выбор финальной цели
      let target = which === 'blue' ? (Math.random() < 0.7 ? LOC.DVER : LOC.OKNO) : (Math.random() < 0.7 ? LOC.OKNO : LOC.DVER);
      if (which === 'blue') state.bluePos = target;
      else state.redPos = target;
    } else {
      let next = pos + 1;
      // Бабки не могут быть в одной комнате (кроме стартовых)
      if (next !== other || next === LOC.LAVOCHKA || next === LOC.PISHIK) {
        if (which === 'blue') state.bluePos = next;
        else state.redPos = next;
      }
    }
  } else if (r > forwardChance + 0.3) {
    // Назад
    if (pos > LOC.PISHIK) {
      if (which === 'blue') state.bluePos--;
      else state.redPos--;
    }
  }
  // Иначе стоим на месте
}

function scheduleMoves() {
  if (!gameRunning) return;
  moveGranny('blue');
  moveGranny('red');
  updateUI();
  
  // Обновляем картинки если нужно
  if (state.currentView === 'door') updateDoorScene();
  if (state.currentView === 'window') updateWindowImage();
  if (state.cameraOpen) updateCameras();
  
  // Проверяем атаку
  checkAttack();
  
  // Следующий ход через 40-90 секунд
  setTimeout(scheduleMoves, rand(40, 90) * 1000);
}

// ========== АТАКА ==========
let blueAttackTimeout = null;
let redAttackTimeout = null;

function checkAttack() {
  // Синяя бабка у двери
  if (state.bluePos === LOC.DVER && !state.doorClosed && !blueAttackTimeout) {
    blueAttackTimeout = setTimeout(() => {
      if (gameRunning && state.bluePos === LOC.DVER && !state.doorClosed) {
        triggerScreamer('A');
      }
      blueAttackTimeout = null;
    }, rand(5, 10) * 1000);
  }
  
  // Красная бабка у двери
  if (state.redPos === LOC.DVER && !state.doorClosed && !redAttackTimeout) {
    redAttackTimeout = setTimeout(() => {
      if (gameRunning && state.redPos === LOC.DVER && !state.doorClosed) {
        triggerScreamer('B');
      }
      redAttackTimeout = null;
    }, rand(3, 7) * 1000);
  }
  
  // Синяя у окна
  if (state.bluePos === LOC.OKNO && !state.windowClosed && !blueAttackTimeout) {
    blueAttackTimeout = setTimeout(() => {
      if (gameRunning && state.bluePos === LOC.OKNO && !state.windowClosed) {
        triggerScreamer('A');
      }
      blueAttackTimeout = null;
    }, rand(5, 10) * 1000);
  }
  
  // Красная у окна
  if (state.redPos === LOC.OKNO && !state.windowClosed && !redAttackTimeout) {
    redAttackTimeout = setTimeout(() => {
      if (gameRunning && state.redPos === LOC.OKNO && !state.windowClosed) {
        triggerScreamer('B');
      }
      redAttackTimeout = null;
    }, rand(3, 7) * 1000);
  }
}

function cancelAttacks() {
  if (blueAttackTimeout) clearTimeout(blueAttackTimeout);
  if (redAttackTimeout) clearTimeout(redAttackTimeout);
  blueAttackTimeout = null;
  redAttackTimeout = null;
}

// ========== ЗАКРЫТИЕ ДВЕРИ/ОКНА ==========
function toggleDoor() {
  state.doorClosed = !state.doorClosed;
  cancelAttacks();
  
  // Если бабка была у двери - отбрасываем на 2 этаж
  if (state.doorClosed) {
    if (state.bluePos === LOC.DVER) state.bluePos = LOC.ET2;
    if (state.redPos === LOC.DVER) state.redPos = LOC.ET2;
  }
  
  updateDoorScene();
  updateUI();
}

function toggleWindow() {
  state.windowClosed = !state.windowClosed;
  cancelAttacks();
  
  // Если бабка была у окна - отбрасываем на 2 этаж
  if (state.windowClosed) {
    if (state.bluePos === LOC.OKNO) state.bluePos = LOC.ET2;
    if (state.redPos === LOC.OKNO) state.redPos = LOC.ET2;
  }
  
  if (state.currentView === 'window') updateWindowImage();
  updateUI();
}

// ========== СКРИМЕР ==========
function triggerScreamer(who) {
  if (!gameRunning) return;
  gameRunning = false;
  
  let img = document.getElementById('screamerImg');
  img.src = `img/Scream%20${who}.png`;
  let screamer = document.getElementById('screamer');
  screamer.classList.add('active');
  
  setTimeout(() => {
    screamer.classList.remove('active');
    let overlay = document.getElementById('overlay-screen');
    let title = document.getElementById('overlayTitle');
    let text = document.getElementById('overlayText');
    title.innerText = 'ОНА ДОБРАЛАСЬ!';
    text.innerText = who === 'A' ? 'СИНЯЯ БАБКА ПОБЕДИЛА' : 'КРАСНАЯ БАБКА ПОБЕДИЛА';
    overlay.className = 'active lose';
  }, 2500);
}

// ========== КАМЕРЫ ==========
let cameraOpen = false;

function buildCameraGrid() {
  let grid = document.getElementById('camGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    let cell = document.createElement('div');
    cell.className = 'cam-cell';
    cell.innerHTML = `<img id="camImg${i}" src="${getCamImage(i)}"><div class="cam-label">КАМ${i+1}</div>`;
    cell.onclick = () => openFullscreenCam(i);
    grid.appendChild(cell);
  }
}

function getCamImage(idx) {
  let cam = CAM_IMGS[idx];
  let hasBlue = state.bluePos === idx;
  let hasRed = state.redPos === idx;
  
  if (idx === LOC.LAVOCHKA && hasBlue && hasRed && cam.AB) return cam.AB;
  if (hasBlue) return cam.A;
  if (hasRed) return cam.B;
  return cam.empty;
}

function updateCameras() {
  for (let i = 0; i < 5; i++) {
    let img = document.getElementById(`camImg${i}`);
    if (img) img.src = getCamImage(i);
  }
}

function toggleCameras() {
  if (cameraOpen) {
    cameraOpen = false;
    document.getElementById('camera-panel').classList.remove('active');
    if (camInterval) clearInterval(camInterval);
    if (state.currentView === 'cameras') {
      state.currentView = 'table';
      document.getElementById('backTableBtn').style.display = 'none';
    }
  } else {
    cameraOpen = true;
    state.currentView = 'cameras';
    updateCameras();
    document.getElementById('camera-panel').classList.add('active');
    document.getElementById('backTableBtn').style.display = 'flex';
    if (camInterval) clearInterval(camInterval);
    camInterval = setInterval(updateCameras, 3500);
  }
}

function openFullscreenCam(idx) {
  // Просто показать крупно - для простоты
  alert(`Камера ${idx+1}\n${CAM_IMGS[idx] ? 'Доступна' : 'Нет сигнала'}`);
}

// ========== ИГРОВОЙ ЦИКЛ ==========
function gameTick() {
  if (!gameRunning) return;
  
  state.seconds++;
  if (state.seconds >= 120) {
    state.seconds = 0;
    state.hour++;
    if (state.hour >= 6) {
      // ПОБЕДА
      gameRunning = false;
      let overlay = document.getElementById('overlay-screen');
      document.getElementById('overlayTitle').innerText = 'РАССВЕТ!';
      document.getElementById('overlayText').innerText = 'ТЫ ПЕРЕЖИЛ ЭТУ НОЧЬ';
      overlay.className = 'active win';
      return;
    }
  }
  
  // Расход воды
  let drain = 0.02;
  if (state.doorClosed) drain += 0.1;
  if (state.windowClosed) drain += 0.1;
  state.water = Math.max(0, state.water - drain);
  
  updateUI();
}

// ========== ЗАПУСК ==========
function startGame() {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  
  gameRunning = true;
  state = {
    water: 100,
    doorClosed: false,
    windowClosed: false,
    currentView: 'table',
    bluePos: LOC.LAVOCHKA,
    redPos: LOC.PISHIK,
    hour: 0,
    seconds: 0
  };
  
  buildCameraGrid();
  showView('table');
  updateUI();
  
  if (gameInterval) clearInterval(gameInterval);
  if (moveInterval) clearTimeout(moveInterval);
  
  gameInterval = setInterval(gameTick, 1000);
  setTimeout(scheduleMoves, 2000);
}

// ========== НАВИГАЦИЯ ==========
function goToDoor() {
  flashTransition(() => showView('door'));
}

function goToWindow() {
  flashTransition(() => {
    showView('window');
    updateWindowImage();
  });
}

function backToTable() {
  closePeephole();
  flashTransition(() => showView('table'));
}

// ========== ПРИВЯЗКА СОБЫТИЙ ==========
document.getElementById('startBtn').onclick = startGame;
document.getElementById('doorToggleBtn').onclick = toggleDoor;
document.getElementById('peepholeActionBtn').onclick = lookThroughPeephole;
document.getElementById('closePeepholeBtn').onclick = closePeephole;
document.getElementById('camBtn').onclick = toggleCameras;
document.getElementById('doorNavBtn').onclick = goToDoor;
document.getElementById('windowNavBtn').onclick = goToWindow;
document.getElementById('backTableBtn').onclick = backToTable;
document.getElementById('backFromDoorBtn').onclick = backToTable;

// Защита от скролла на мобильных
document.addEventListener('touchmove', e => {
  if (e.target.tagName !== 'BUTTON') e.preventDefault();
}, { passive: false });
</script>
