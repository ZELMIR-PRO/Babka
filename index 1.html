<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>5 Ночей с Бабками</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Russo+One&family=Share+Tech+Mono&display=swap');

  :root {
    --red: #c0392b;
    --green-cam: #00ff41;
    --amber: #ffb000;
    --water-color: #3498db;
    --hud-h: 115px;
    --top-h: 50px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }

  html, body {
    background: #000;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    width: 100%;
    height: 100%;
    height: 100dvh;
  }

  /* ========== MENU ========== */
  #menu {
    position: fixed; inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  #menu h1 {
    font-family: 'Creepster', cursive;
    font-size: clamp(2.4rem, 11vw, 5rem);
    color: var(--red);
    text-shadow: 0 0 40px rgba(192,57,43,0.8), 0 0 80px rgba(192,57,43,0.4);
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.1;
    animation: flicker 4s infinite;
  }
  #menu .subtitle {
    font-family: 'Russo One', sans-serif;
    color: #555;
    margin-top: 8px;
    font-size: clamp(0.55rem, 3vw, 0.85rem);
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  #menu .night-info {
    margin-top: 28px;
    font-size: clamp(1rem, 4vw, 1.4rem);
    color: var(--amber);
    font-family: 'Russo One', sans-serif;
  }
  #menu .start-btn {
    margin-top: 24px;
    padding: 16px 44px;
    background: transparent;
    border: 2px solid var(--red);
    color: var(--red);
    font-family: 'Russo One', sans-serif;
    font-size: clamp(1rem, 4vw, 1.3rem);
    letter-spacing: 4px;
    cursor: pointer;
    text-transform: uppercase;
    border-radius: 2px;
    transition: 0.1s;
  }
  #menu .start-btn:hover { background: var(--red); color: #fff; }
  .menu-babs {
    position: absolute;
    bottom: 0;
    display: flex;
    justify-content: center;
    width: 100%;
    gap: 20px;
    pointer-events: none;
  }
  .menu-babs img {
    height: clamp(150px, 38vh, 270px);
    object-fit: contain;
    mix-blend-mode: lighten;
    opacity: 0.65;
    filter: drop-shadow(0 0 16px rgba(255,0,0,0.3));
  }

  /* ========== GAME ========== */
  #game {
    display: none;
    width: 100%;
    height: 100%;
    height: 100dvh;
    position: relative;
    overflow: hidden;
  }

  /* TOP BAR */
  #topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: var(--top-h);
    padding: 0 12px;
    background: rgba(0,0,0,0.95);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 20;
    border-bottom: 1px solid #1a1a1a;
  }
  .granny-status {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
  }
  .granny-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
  }
  .granny-dot.blue { background: #3498db; }
  .granny-dot.red  { background: var(--red); }
  .granny-name.blue { color: #3498db; }
  .granny-name.red  { color: var(--red); }
  .granny-name { font-size: 0.58rem; letter-spacing: 1px; }
  .granny-loc  { font-size: 0.52rem; color: #555; }
  .topbar-time {
    font-family: 'Russo One', sans-serif;
    font-size: 1rem;
    color: var(--amber);
    text-shadow: 0 0 8px rgba(255,176,0,0.5);
    white-space: nowrap;
  }

  /* APARTMENT VIEW */
  #apartment-view {
    position: absolute;
    top: var(--top-h);
    left: 0; right: 0;
    bottom: var(--hud-h);
    background: #000;
    overflow: hidden;
  }
  #apartment-view img.scene-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* CAMERA PANEL */
  #camera-panel {
    display: none;
    position: absolute;
    top: var(--top-h);
    left: 0; right: 0;
    bottom: var(--hud-h);
    background: #000;
    flex-direction: column;
    z-index: 10;
  }
  #camera-panel.active { display: flex; }
  .cam-header {
    padding: 5px 10px;
    background: #050505;
    border-bottom: 1px solid #111;
    display: flex;
    gap: 12px;
    font-size: 0.58rem;
    color: var(--green-cam);
    flex-shrink: 0;
  }
  .blink { animation: blink 1s infinite; }
  .cam-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 2px;
    padding: 2px;
    background: #050505;
    overflow: hidden;
  }
  .cam-cell:nth-child(5) { grid-column: 1 / -1; }
  .cam-cell {
    position: relative;
    background: #000;
    overflow: hidden;
    border: 1px solid #111;
    cursor: pointer;
    transition: 0.1s;
  }
  .cam-cell:hover { border-color: var(--green-cam); }
  .cam-cell img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: grayscale(0.45) contrast(1.15) brightness(0.7) sepia(0.15);
  }
  .cam-label {
    position: absolute;
    bottom: 4px; left: 5px;
    font-size: 0.48rem;
    color: var(--green-cam);
    text-shadow: 0 0 4px var(--green-cam);
    z-index: 4;
  }
  .cam-rec {
    position: absolute;
    top: 4px; right: 5px;
    font-size: 0.48rem;
    color: var(--red);
    animation: blink 1.5s infinite;
    z-index: 4;
  }
  .cam-close-bar {
    padding: 6px 10px;
    background: #050505;
    border-top: 1px solid #111;
    display: flex;
    justify-content: flex-end;
  }
  .cam-close-bar button {
    padding: 9px 20px;
    background: #1a0808;
    border: 1px solid var(--red);
    color: var(--red);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    cursor: pointer;
  }

  /* DOOR SCENE */
  #scene-dver-side {
    display: none;
    position: absolute;
    top: var(--top-h);
    left: 0; right: 0;
    bottom: var(--hud-h);
    z-index: 15;
    background: #000;
  }
  #scene-dver-side.active { display: block; }
  #scene-dver-side > img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .door-scene-btns {
    position: absolute;
    bottom: 14px;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 9px;
    padding: 0 18px;
  }
  .door-scene-btn {
    width: 100%;
    max-width: 340px;
    padding: 14px 20px;
    background: rgba(0,0,0,0.88);
    border: 1px solid #444;
    color: #ccc;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 3px;
    text-align: center;
  }
  .door-scene-btn.primary   { border-color: var(--red); color: var(--red); }
  .door-scene-btn.secondary { border-color: #3498db; color: #3498db; }
  .door-scene-btn.muted     { border-color: #2a2a2a; color: #555; }
  .door-scene-btn:hover { opacity: 0.8; }

  /* PEEPHOLE — НОВЫЙ ДИЗАЙН С ЭФФЕКТОМ ГЛАЗКА */
  #peephole-overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 60;
    background: rgba(0,0,0,0.96);
    align-items: center;
    justify-content: center;
  }
  #peephole-overlay.active { display: flex; }
  .peephole-container {
    position: relative;
    width: min(82vw, 70vh);
    height: min(82vw, 70vh);
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 0 8px #1a1a1a, 0 0 0 12px #0a0a0a, 0 0 0 100vmax rgba(0,0,0,0.85), inset 0 0 30px rgba(0,0,0,0.8);
    border: 2px solid #444;
    background: #000;
  }
  .peephole-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(1.05) contrast(1.2) sepia(0.2) blur(0.3px);
    display: block;
  }
  .peephole-close {
    position: fixed;
    bottom: calc(var(--hud-h) + 14px);
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 28px;
    background: rgba(0,0,0,0.92);
    border: 1px solid #666;
    color: #aaa;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    cursor: pointer;
    letter-spacing: 2px;
    border-radius: 30px;
    white-space: nowrap;
    z-index: 61;
  }
  .peephole-close:hover { background: #1a1a1a; }

  /* HUD */
  #hud {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: var(--hud-h);
    background: rgba(0,0,0,0.97);
    border-top: 1px solid #1a1a1a;
    display: flex;
    flex-direction: column;
    z-index: 20;
    padding: 8px 10px 12px;
    gap: 8px;
  }
  .hud-water-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .water-label { font-size: 0.56rem; color: var(--water-color); letter-spacing: 2px; }
  .water-bar {
    flex: 1;
    height: 7px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    overflow: hidden;
  }
  .water-fill {
    height: 100%;
    background: var(--water-color);
    transition: width 0.5s;
    box-shadow: 0 0 5px rgba(52,152,219,0.5);
  }
  .water-fill.warn { background: #e74c3c !important; animation: water-warn 0.5s infinite; }
  .water-pct { font-size: 0.55rem; color: var(--water-color); min-width: 30px; text-align: right; }
  .hud-btn-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    flex: 1;
  }
  .hud-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    background: #0d0d0d;
    border: 1px solid #252525;
    color: #888;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.5rem;
    cursor: pointer;
    border-radius: 3px;
    padding: 5px 2px;
    text-transform: uppercase;
    transition: 0.05s linear;
  }
  .hud-btn .btn-icon { font-size: 1.15rem; }
  .hud-btn:active { opacity: 0.6; }
  .hud-btn.cam-btn  { border-color: #0f2e0f; color: var(--green-cam); }
  .hud-btn.door-btn { border-color: #2e0f0f; color: #d07070; }
  .hud-btn.win-btn  { border-color: #0f1e2e; color: #70a0d0; }
  .hud-btn.back-btn { border-color: #1e1e0f; color: #909060; }
  .hud-btn.door-btn.closed, .hud-btn.win-btn.closed { background: rgba(192,57,43,0.18); border-color: var(--red); color: var(--red); }

  /* SCREAMER */
  #screamer {
    display: none;
    position: fixed; inset: 0;
    z-index: 999;
    background: #000;
    align-items: center;
    justify-content: center;
  }
  #screamer.active { display: flex; }
  #screamer img { width: 100%; height: 100%; object-fit: cover; animation: scream-shake 0.08s infinite; }

  /* WIN/LOSE */
  #overlay-screen {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.94);
    z-index: 998;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 30px;
    text-align: center;
  }
  #overlay-screen.active { display: flex; }
  #overlay-screen h2 { font-family: 'Creepster', cursive; font-size: clamp(2.4rem, 13vw, 5rem); text-shadow: 0 0 40px currentColor; }
  #overlay-screen.win  h2 { color: var(--amber); }
  #overlay-screen.lose h2 { color: var(--red); }
  #overlay-screen p { color: #666; font-size: clamp(0.62rem, 3vw, 0.88rem); letter-spacing: 3px; }
  #overlay-screen button {
    margin-top: 16px;
    padding: 16px 40px;
    background: transparent;
    border: 2px solid var(--amber);
    color: var(--amber);
    font-family: 'Russo One', sans-serif;
    font-size: clamp(0.9rem, 4vw, 1.1rem);
    cursor: pointer;
    letter-spacing: 3px;
  }
  #overlay-screen button:hover { background: var(--amber); color: #000; }

  /* TRANSITION */
  .scene-transition {
    position: absolute; inset: 0;
    background: #000;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s;
  }
  .scene-transition.flash { opacity: 1; }

  /* FULLSCREEN CAM */
  #cam-fullscreen {
    display: none;
    position: fixed; inset: 0;
    z-index: 200;
    background: #000;
    flex-direction: column;
  }
  #cam-fullscreen.active { display: flex; }
  .fs-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: #050505;
    border-bottom: 1px solid #111;
  }
  .fs-label { font-size: 0.7rem; color: var(--green-cam); letter-spacing: 2px; }
  .fs-close {
    padding: 8px 18px;
    background: transparent;
    border: 1px solid #333;
    color: #666;
    font-family: 'Share Tech Mono', monospace;
    cursor: pointer;
  }
  .fs-close:hover { background: #1a1a1a; }
  .fs-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .fs-img-wrap img { width: 100%; height: 100%; object-fit: contain; filter: grayscale(0.45) contrast(1.15) brightness(0.75); }

  @keyframes flicker { 0%,100%{opacity:1}92%{opacity:1}93%{opacity:.4}94%{opacity:1}96%{opacity:.6}97%{opacity:1} }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
  @keyframes water-warn { 0%,100%{box-shadow:0 0 5px #e74c3c} 50%{box-shadow:0 0 14px #e74c3c} }
  @keyframes scream-shake { 0%{transform:translate(-5px,-4px)} 25%{transform:translate(5px,4px)} 50%{transform:translate(-4px,5px)} 75%{transform:translate(4px,-5px)} }
  .glitch-cam img { animation: glitch 0.18s steps(2) 3; }
  @keyframes glitch { 0%{transform:translate(-2px,1px)} 50%{transform:translate(2px,-1px)} 100%{transform:translate(0)} }
</style>
</head>
<body>

<div id="menu">
  <h1>5 НОЧЕЙ<br>С БАБКАМИ</h1>
  <div class="subtitle">Ночь в подъезде</div>
  <div class="night-info">НОЧЬ 1 / 6</div>
  <button class="start-btn" id="start-btn">▶ НАЧАТЬ</button>
  <div class="menu-babs">
    <img src="img/Pishik%20A.png" alt="">
    <img src="img/Pishik%20B.png" alt="">
  </div>
</div>

<div id="game">
  <div id="topbar">
    <div class="granny-status"><div class="granny-dot blue"></div><div class="granny-info"><div class="granny-name blue">СИНЯЯ</div><div class="granny-loc" id="blue-loc">Лавочка</div></div></div>
    <div class="granny-status"><div class="granny-dot red"></div><div class="granny-info"><div class="granny-name red">КРАСНАЯ</div><div class="granny-loc" id="red-loc">Пыжик</div></div></div>
    <div class="topbar-time" id="hud-time">00:00</div>
  </div>
  <div id="apartment-view"><img class="scene-img" id="main-scene" src="img/Table.png" alt=""></div>
  <div id="camera-panel"><div class="cam-header"><span class="blink">● REC</span><span>НАБЛЮДЕНИЕ</span><span id="cam-time-display" style="margin-left:auto">00:00</span></div><div class="cam-grid" id="cam-grid"></div><div class="cam-close-bar"><button onclick="closeCameras()">✕ ЗАКРЫТЬ КАМЕРЫ</button></div></div>
  <div id="scene-dver-side"><img id="door-scene-img" src="img/Dver%20Open.png" alt=""><div class="door-scene-btns"><button class="door-scene-btn primary" id="door-toggle-btn">🔒 ЗАКРЫТЬ ДВЕРЬ</button><button class="door-scene-btn secondary" id="peephole-btn" style="display:none">👁 ПОСМОТРЕТЬ В ГЛАЗОК</button><button class="door-scene-btn muted" id="back-from-door">← НАЗАД</button></div></div>
  <div id="peephole-overlay"><div class="peephole-container"><img id="peephole-img" src="img/Glass%20D.png" alt=""></div><button class="peephole-close" id="close-peephole">ОТОЙТИ ОТ ГЛАЗКА</button></div>
  <div class="scene-transition" id="transition"></div>
  <div id="hud"><div class="hud-water-row"><span class="water-label">💧 ВОДА</span><div class="water-bar"><div class="water-fill" id="water-fill" style="width:100%"></div></div><span class="water-pct" id="water-pct">100%</span></div><div class="hud-btn-row"><button class="hud-btn cam-btn" id="cam-hud-btn"><span class="btn-icon">📷</span>КАМЕРЫ</button><button class="hud-btn door-btn" id="door-hud-btn"><span class="btn-icon">🚪</span>ДВЕРЬ</button><button class="hud-btn win-btn" id="win-hud-btn"><span class="btn-icon">🪟</span>ОКНО</button><button class="hud-btn back-btn" id="back-hud-btn" style="display:none"><span class="btn-icon">🖥</span>СТОЛ</button></div></div>
</div>
<div id="cam-fullscreen"><div class="fs-header"><span class="fs-label blink">● REC <span id="fs-cam-label">КАМ1</span></span><button class="fs-close" id="fs-close-btn">✕ ЗАКРЫТЬ</button></div><div class="fs-img-wrap"><img id="fs-cam-img" src=""></div></div>
<div id="screamer"><img id="screamer-img" src=""></div>
<div id="overlay-screen"><h2 id="overlay-title">GAME OVER</h2><p id="overlay-sub"></p><button onclick="restartGame()">↺ ЕЩЁ РАЗ</button></div>

<script>
// ========== КОНСТАНТЫ ==========
const LOCATIONS = ['Пыжик','Лавочка','Вход','Лифт','2 этаж','Дверь','Окно'];
const LOC = { PISHIK:0, LAVOCHKA:1, VHOD:2, LIFT:3, ET2:4, DVER:5, OKNO:6 };
const CAM_IMGS = {
  0: { empty:'img/Pishik.png',   A:'img/Pishik%20A.png',   B:'img/Pishik%20B.png' },
  1: { empty:'img/Lavochka.png', A:'img/Lavochka%20A.png', B:'img/Lavochka%20B.png', AB:'img/Lavocka%20AB.png' },
  2: { empty:'img/Vhod.jpg',     A:'img/Vhod%20A.jpg',     B:'img/Vhod%20B.jpg' },
  3: { empty:'img/Lift.jpeg',     A:'img/Lift%20A.png',     B:'img/Lift%20B.png' },
  4: { empty:'img/2Et.png',      A:'img/2Et%20A.png',      B:'img/2Et%20B.png' }
};
const CAM_LABELS = ['КАМ1·ПЫЖИК','КАМ2·ЛАВОЧКА','КАМ3·ВХОД','КАМ4·ЛИФТ','КАМ5·2ЭТ'];

let state = {}, gameLoopId = null, moveTimeout = null, camUpdateId = null;

function freshState() {
  return {
    water: 100, doorClosed: false, windowClosed: false, currentView: 'table',
    cameraOpen: false, gameRunning: false,
    bluePos: LOC.LAVOCHKA, redPos: LOC.PISHIK,
    nightHour: 0, secondsInHour: 0,
    bluePending: false, redPending: false,
    blueRetreatTimer: null, redRetreatTimer: null
  };
}

// ========== ЗАПУСК ==========
function startGame() {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  state = freshState();
  buildCameraGrid();
  showView('table');
  state.gameRunning = true;
  if(gameLoopId) clearInterval(gameLoopId);
  gameLoopId = setInterval(gameTick, 1000);
  scheduleMoves();
  updateLocLabels();
  updateWaterUI();
  updateTimeUI();
}
function restartGame() { clearAllTimers(); document.getElementById('overlay-screen').className = ''; document.getElementById('overlay-screen').style.display = 'none'; startGame(); }
function clearAllTimers() { clearInterval(gameLoopId); clearTimeout(moveTimeout); clearInterval(camUpdateId); if(state.blueRetreatTimer) clearTimeout(state.blueRetreatTimer); if(state.redRetreatTimer) clearTimeout(state.redRetreatTimer); }

// ========== ИГРОВОЙ ЦИКЛ ==========
function gameTick() {
  if (!state.gameRunning) return;
  state.secondsInHour++;
  if (state.secondsInHour >= 120) { state.secondsInHour = 0; state.nightHour++; if (state.nightHour >= 6) { winGame(); return; } }
  let drain = 0.025;
  if (state.doorClosed) drain += 0.12;
  if (state.windowClosed) drain += 0.12;
  state.water = Math.max(0, state.water - drain);
  updateWaterUI();
  updateTimeUI();
  checkAttack();
}

// ========== ДВИЖЕНИЕ БАБОК ==========
function scheduleMoves() { moveTimeout = setTimeout(() => { if(state.gameRunning){ moveGrannies(); scheduleMoves(); } }, randInt(45, 100)*1000); }
function moveGrannies() { moveOne('blue'); moveOne('red'); updateLocLabels(); if(state.cameraOpen) updateCamImages(); refreshDoorWindowUI(); }
function moveOne(who) {
  let pos = who === 'blue' ? state.bluePos : state.redPos;
  let other = who === 'blue' ? state.redPos : state.bluePos;
  let wf = 1 - state.water/100;
  let fwdChance = 0.3 + wf * 0.55;
  let r = Math.random();
  if(r < fwdChance) {
    if(pos >= LOC.ET2) { setPos(who, chooseFinal(who)); return; }
    let next = pos+1;
    if(next !== LOC.LAVOCHKA && next === other) return;
    setPos(who, next);
  } else if(r < fwdChance + 0.25) { return; }
  else { if(pos > LOC.PISHIK) setPos(who, pos-1); }
}
function setPos(who, p) { if(who==='blue') state.bluePos=p; else state.redPos=p; }
function chooseFinal(who) { return who==='blue' ? (Math.random()<0.7?LOC.DVER:LOC.OKNO) : (Math.random()<0.7?LOC.OKNO:LOC.DVER); }

// ========== ЗАКРЫТИЕ ДВЕРИ/ОКНА ОТБРАСЫВАЕТ БАБКУ ==========
async function pushBackFromDoorWindow() {
  if(state.bluePos === LOC.DVER && state.doorClosed) { setPos('blue', LOC.ET2); if(state.blueRetreatTimer) clearTimeout(state.blueRetreatTimer); state.bluePending=false; }
  if(state.redPos === LOC.DVER && state.doorClosed) { setPos('red', LOC.ET2); if(state.redRetreatTimer) clearTimeout(state.redRetreatTimer); state.redPending=false; }
  if(state.bluePos === LOC.OKNO && state.windowClosed) { setPos('blue', LOC.ET2); if(state.blueRetreatTimer) clearTimeout(state.blueRetreatTimer); state.bluePending=false; }
  if(state.redPos === LOC.OKNO && state.windowClosed) { setPos('red', LOC.ET2); if(state.redRetreatTimer) clearTimeout(state.redRetreatTimer); state.redPending=false; }
  updateLocLabels(); refreshDoorWindowUI();
}

// ========== АТАКА ==========
function checkAttack() {
  tryAttack('blue', state.bluePos, 'bluePending', 'A', 5, 10);
  tryAttack('red', state.redPos, 'redPending', 'B', 3, 7);
}
function tryAttack(who, pos, flag, scream, minD, maxD) {
  if(state[flag]) return;
  let atDoor = (pos === LOC.DVER && !state.doorClosed);
  let atWin = (pos === LOC.OKNO && !state.windowClosed);
  if(!atDoor && !atWin) return;
  state[flag]=true;
  let timer = setTimeout(()=>{
    if(!state.gameRunning) return;
    let cur = who==='blue'?state.bluePos:state.redPos;
    let still = (cur===LOC.DVER && !state.doorClosed) || (cur===LOC.OKNO && !state.windowClosed);
    if(still) triggerScreamer(scream);
    else state[flag]=false;
  }, randInt(minD,maxD)*1000);
  if(who==='blue') state.blueRetreatTimer=timer; else state.redRetreatTimer=timer;
}

function triggerScreamer(who){
  if(!state.gameRunning) return;
  state.gameRunning=false;
  clearAllTimers();
  let img=document.getElementById('screamer-img');
  img.src=`img/Scream%20${who}.png`;
  let scr=document.getElementById('screamer');
  scr.classList.add('active');
  setTimeout(()=>{ scr.classList.remove('active'); showLose(who); },2800);
}
function showLose(who){ document.getElementById('overlay-title').textContent='ОНА ДОБРАЛАСЬ!'; document.getElementById('overlay-sub').textContent=who==='A'?'СИНЯЯ БАБКА ПОБЕДИЛА':'КРАСНАЯ БАБКА ПОБЕДИЛА'; let ov=document.getElementById('overlay-screen'); ov.className='active lose'; ov.style.display='flex'; }
function winGame(){ state.gameRunning=false; clearAllTimers(); document.getElementById('overlay-title').textContent='РАССВЕТ!'; document.getElementById('overlay-sub').textContent='ТЫ ПЕРЕЖИЛ ЭТУ НОЧЬ'; let ov=document.getElementById('overlay-screen'); ov.className='active win'; ov.style.display='flex'; }

// ========== UI ОБНОВЛЕНИЯ ==========
function updateTimeUI(){ let m=Math.floor((state.secondsInHour/120)*60); let str=`0${state.nightHour}:${m<10?'0'+m:m}`; document.getElementById('hud-time').textContent=str; document.getElementById('cam-time-display').textContent=str; }
function updateWaterUI(){ let pct=Math.round(state.water); let fill=document.getElementById('water-fill'); fill.style.width=pct+'%'; document.getElementById('water-pct').textContent=pct+'%'; if(pct<=20) fill.classList.add('warn'); else fill.classList.remove('warn'); }
function updateLocLabels(){ document.getElementById('blue-loc').textContent=LOCATIONS[state.bluePos]; document.getElementById('red-loc').textContent=LOCATIONS[state.redPos]; }

function refreshDoorWindowUI(){
  let doorImg=document.getElementById('door-scene-img');
  if(state.doorClosed) doorImg.src='img/Dver.jpg';
  else if(state.bluePos===LOC.DVER) doorImg.src='img/Dver%20Open%20A.png';
  else if(state.redPos===LOC.DVER) doorImg.src='img/Dver%20Open%20B.png';
  else doorImg.src='img/Dver%20Open.png';
  let toggleBtn=document.getElementById('door-toggle-btn');
  toggleBtn.textContent=state.doorClosed?'🔓 ОТКРЫТЬ ДВЕРЬ':'🔒 ЗАКРЫТЬ ДВЕРЬ';
  toggleBtn.className=state.doorClosed?'door-scene-btn secondary':'door-scene-btn primary';
  document.getElementById('peephole-btn').style.display=state.doorClosed?'block':'none';
  let winImg=document.getElementById('main-scene');
  if(state.currentView==='window'){
    if(state.windowClosed) winImg.src='img/Window.png';
    else if(state.bluePos===LOC.OKNO) winImg.src='img/Window%20Open%20A.png';
    else if(state.redPos===LOC.OKNO) winImg.src='img/Window%20Open%20B.png';
    else winImg.src='img/Window%20Open.png';
  }
  let doorHud=document.getElementById('door-hud-btn'), winHud=document.getElementById('win-hud-btn');
  state.doorClosed?doorHud.classList.add('closed'):doorHud.classList.remove('closed');
  state.windowClosed?winHud.classList.add('closed'):winHud.classList.remove('closed');
}

// ========== ДЕЙСТВИЯ ДВЕРЬ/ОКНО ==========
function toggleDoor(){
  playClick();
  state.doorClosed=!state.doorClosed;
  state.bluePending=false; state.redPending=false;
  if(state.blueRetreatTimer) clearTimeout(state.blueRetreatTimer);
  if(state.redRetreatTimer) clearTimeout(state.redRetreatTimer);
  pushBackFromDoorWindow();
  refreshDoorWindowUI();
}
function toggleWindow(){
  playClick();
  state.windowClosed=!state.windowClosed;
  state.bluePending=false; state.redPending=false;
  if(state.blueRetreatTimer) clearTimeout(state.blueRetreatTimer);
  if(state.redRetreatTimer) clearTimeout(state.redRetreatTimer);
  pushBackFromDoorWindow();
  refreshDoorWindowUI();
  if(state.currentView==='window') document.getElementById('main-scene').src = state.windowClosed?'img/Window.png': (state.bluePos===LOC.OKNO?'img/Window%20Open%20A.png':(state.redPos===LOC.OKNO?'img/Window%20Open%20B.png':'img/Window%20Open.png'));
}
// ГЛАЗОК ПОЛНОСТЬЮ ПЕРЕДЕЛАН
function lookThroughPeephole(){
  if(!state.doorClosed) return;
  let doorImg=document.getElementById('door-scene-img');
  doorImg.src='img/Dver%20Side.jpg';
  setTimeout(()=>{
    let src='img/Glass%20D.png';
    if(state.bluePos===LOC.DVER) src='img/Glass%20A.png';
    else if(state.redPos===LOC.DVER) src='img/Glass%20B.png';
    document.getElementById('peephole-img').src=src;
    document.getElementById('peephole-overlay').classList.add('active');
  },300);
}
function closePeephole(){ document.getElementById('peephole-overlay').classList.remove('active'); refreshDoorWindowUI(); }

// ========== КАМЕРЫ ==========
function buildCameraGrid(){
  let grid=document.getElementById('cam-grid'); grid.innerHTML='';
  for(let i=0;i<5;i++){ let cell=document.createElement('div'); cell.className='cam-cell'; cell.id=`cam-${i}`; cell.innerHTML=`<img id="cam-img-${i}" src="${getCamImg(i)}"><div class="cam-label">${CAM_LABELS[i]}</div><div class="cam-rec">● REC</div>`; cell.onclick=()=>openFullscreenCam(i); grid.appendChild(cell); }
}
function getCamImg(i){ let imgs=CAM_IMGS[i]; let b=state.bluePos===i, r=state.redPos===i; if(i===LOC.LAVOCHKA && b && r) return imgs.AB||imgs.empty; if(b) return imgs.A; if(r) return imgs.B; return imgs.empty; }
function updateCamImages(){ for(let i=0;i<5;i++){ let img=document.getElementById(`cam-img-${i}`); if(img){ img.src=getCamImg(i); if(Math.random()<0.1) document.getElementById(`cam-${i}`).classList.add('glitch-cam'), setTimeout(()=>document.getElementById(`cam-${i}`)?.classList.remove('glitch-cam'),320); } } }
function toggleCameras(){ playClick(); if(state.cameraOpen) closeCameras(); else { state.cameraOpen=true; state.currentView='cameras'; document.getElementById('camera-panel').classList.add('active'); document.getElementById('back-hud-btn').style.display='flex'; updateCamImages(); if(camUpdateId) clearInterval(camUpdateId); camUpdateId=setInterval(updateCamImages,3200); } }
function closeCameras(){ state.cameraOpen=false; document.getElementById('camera-panel').classList.remove('active'); clearInterval(camUpdateId); if(state.currentView==='cameras'){ state.currentView='table'; document.getElementById('back-hud-btn').style.display='none'; document.getElementById('main-scene').src='img/Table.png'; } }
let fsCamIndex=-1, fsUpdateId=null;
function openFullscreenCam(i){ fsCamIndex=i; document.getElementById('fs-cam-label').textContent=CAM_LABELS[i]; document.getElementById('fs-cam-img').src=getCamImg(i); document.getElementById('cam-fullscreen').classList.add('active'); if(fsUpdateId) clearInterval(fsUpdateId); fsUpdateId=setInterval(()=>{ if(fsCamIndex>=0) document.getElementById('fs-cam-img').src=getCamImg(fsCamIndex); },3200); }
function closeFullscreenCam(){ fsCamIndex=-1; clearInterval(fsUpdateId); document.getElementById('cam-fullscreen').classList.remove('active'); }

// ========== НАВИГАЦИЯ ==========
function showView(view){
  state.currentView=view;
  document.getElementById('scene-dver-side').classList.remove('active');
  document.getElementById('camera-panel').classList.remove('active');
  if(state.cameraOpen) closeCameras();
  if(view==='table'){ document.getElementById('main-scene').src='img/Table.png'; document.getElementById('back-hud-btn').style.display='none'; }
  else if(view==='door'){ document.getElementById('scene-dver-side').classList.add('active'); refreshDoorWindowUI(); document.getElementById('back-hud-btn').style.display='flex'; }
  else if(view==='window'){ refreshDoorWindowUI(); document.getElementById('back-hud-btn').style.display='flex'; }
}
function goToDoor(){ playClick(); flashTransition(()=>showView('door')); }
function goToWindow(){ playClick(); flashTransition(()=>showView('window')); }
function backToTable(){ playClick(); closePeephole(); flashTransition(()=>showView('table')); }
function handleWindowBtn(){ if(state.currentView==='window') toggleWindow(); else goToWindow(); }

function flashTransition(cb){ let el=document.getElementById('transition'); el.classList.add('flash'); setTimeout(()=>{ cb(); el.classList.remove('flash'); },120); }
function playClick(){ try{ let ctx=new (window.AudioContext||window.webkitAudioContext)(); let o=ctx.createOscillator(), g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.type='square'; o.frequency.value=120; g.gain.setValueAtTime(0.06,ctx.currentTime); g.gain.linearRampToValueAtTime(0,ctx.currentTime+0.07); o.start(); o.stop(ctx.currentTime+0.09); }catch(e){} }
function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

// ========== ПРИВЯЗКА КНОПОК ==========
document.getElementById('start-btn').onclick=()=>startGame();
document.getElementById('door-toggle-btn').onclick=()=>toggleDoor();
document.getElementById('peephole-btn').onclick=()=>lookThroughPeephole();
document.getElementById('close-peephole').onclick=()=>closePeephole();
document.getElementById('cam-hud-btn').onclick=()=>toggleCameras();
document.getElementById('door-hud-btn').onclick=()=>goToDoor();
document.getElementById('win-hud-btn').onclick=()=>handleWindowBtn();
document.getElementById('back-hud-btn').onclick=()=>backToTable();
document.getElementById('back-from-door').onclick=()=>backToTable();
document.getElementById('fs-close-btn').onclick=()=>closeFullscreenCam();
document.addEventListener('touchmove',e=>{ if(e.target.tagName!=='BUTTON') e.preventDefault();},{passive:false});
</script>
